apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradewisev2-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tradewisev2-grafana
  template:
    metadata:
      labels:
        app: tradewisev2-grafana
    spec:
      containers:
        - name: tradewisev2-grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
